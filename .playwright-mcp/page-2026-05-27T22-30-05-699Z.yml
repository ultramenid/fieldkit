        - heading "Local server overview" [level=2] [ref=e255]
        - paragraph [ref=e257]: The local server runs on any laptop or field machine. It hosts your form over Wi-Fi so anyone on the same network can submit responses without internet. Collected data is exported and merged into the serverside when connectivity is available.
