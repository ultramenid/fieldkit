    - generic [ref=e285]:
      - heading "The Vibe Coding Platform for Builders Who Ship" [level=2] [ref=e286]
      - generic [ref=e287]:
        - paragraph [ref=e288]: BridgeMind is the vibe coding platform built for a new era of software development. Instead of writing code manually, builders describe their intent in natural language and AI coding agents handle the implementation. This agentic coding approach lets you focus on planning and review while coding agents do the heavy lifting — writing code, debugging issues, and shipping features across your entire codebase.
        - paragraph [ref=e289]:
          - text: At the core of BridgeMind is
          - link "BridgeSpace" [ref=e290] [cursor=pointer]:
            - /url: /products/bridgespace
          - text: — the agentic development environment with a built-in vibe kanban board, multi-pane terminal workspaces, and AI agent orchestration. Manage tasks visually with drag and drop, launch coding agents directly from your task board, and watch AI generated code appear in real time across up to 16 parallel terminal sessions.
        - paragraph [ref=e291]:
          - link "BridgeMCP" [ref=e292] [cursor=pointer]:
            - /url: /bridgemcp
          - text: is our Model Context Protocol (MCP) server — the shared context layer that connects your AI code editor to the BridgeMind platform. Whether you use Cursor, Claude Code, Windsurf, or OpenAI Codex, BridgeMCP gives your AI agent access to shared tasks, project knowledge, and coordinated workflows. It turns any MCP-compatible tool into a connected teammate.
        - paragraph [ref=e293]:
          - link "BridgeVoice" [ref=e294] [cursor=pointer]:
            - /url: /products/bridgevoice
          - text: brings voice coding to every app on your desktop. Powered by the Whisper model for local transcription and cloud mode for 99+ languages, BridgeVoice lets you dictate commit messages, documentation, and Slack messages without touching the keyboard. Process audio files locally for complete privacy or use cloud transcription for maximum accuracy.
        - paragraph [ref=e295]:
          - link "BridgeCode" [ref=e296] [cursor=pointer]:
            - /url: /products/bridgecode
          - text: is our AI coding CLI — a command line tool that turns natural language into multi-step code changes. Express your intent from the terminal and let AI agents scaffold projects, add features, and fix bugs across your codebase. No IDE required.
        - paragraph [ref=e297]: Join 10,000+ Discord members, 74,000+ YouTube subscribers, and 31,000+ X followers who are already building the future of software development with BridgeMind. Whether you are exploring the vibe coding movement for the first time or scaling an agentic coding workflow in production, BridgeMind provides the tools, community, and infrastructure to help you ship faster.
